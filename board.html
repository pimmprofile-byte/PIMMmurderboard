<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>졸업사진 卒業寫眞 — 게임보드 (서버 없음)</title>
<style>
  :root{
    --bg:#0b0a0d;--bg2:#111015;--panel:#17151d;--panel2:#1f1c27;--line:#2f2a3a;
    --ink:#ece7f0;--sub:#a49db8;--muted:#6f697f;
    --ember:#c8442f;--ember-b:#e7654c;--gold:#c9a24a;--gold-b:#e0bd6a;--cold:#7fb4d6;
    --good:#7ee0a8;--warn:#ffd479;--shadow:0 18px 50px rgba(0,0,0,.6);
  }
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);line-height:1.62;-webkit-font-smoothing:antialiased;min-height:100vh;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR","Apple SD Gothic Neo",sans-serif}
  .serif{font-family:"Nanum Myeongjo","Batang","AppleMyungjo",serif}
  button{font-family:inherit}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:13.5px;transition:.15s}
  .btn:hover{border-color:var(--gold);color:#fff}
  .btn.gold{background:linear-gradient(90deg,#8a7038,var(--gold));border-color:var(--gold);color:#1a1509;font-weight:700}
  .btn.ember{background:linear-gradient(90deg,#7a1410,var(--ember));border-color:var(--ember-b);color:#fff;font-weight:700}
  .btn.sm{padding:5px 10px;font-size:12px;border-radius:8px}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .pill{display:inline-block;font-size:11px;padding:2px 9px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);color:var(--sub)}
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,rgba(17,15,21,.97),rgba(17,15,21,.8));backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  header .b{font-weight:700;letter-spacing:.04em;display:flex;align-items:center;gap:8px}.header .b .mk,header .mk{color:var(--ember)}
  header .ph{font-size:12.5px;color:var(--gold)}
  .tabs{display:flex;gap:6px;flex-wrap:wrap;padding:12px 16px 0;max-width:900px;margin:0 auto}
  .tab{background:var(--panel2);border:1px solid var(--line);color:var(--sub);padding:7px 14px;border-radius:20px;cursor:pointer;font-size:13px}
  .tab.on{background:var(--ink);color:#0b0a0d;border-color:var(--ink);font-weight:700}
  .wrap{max-width:900px;margin:0 auto;padding:14px 16px 60px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}
  .card h2{margin:0 0 10px;font-size:15px;color:var(--gold-b)}
  .lead{color:var(--sub);font-size:13px;line-height:1.75}

  .stepper{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px}
  .step{flex:1;min-width:66px;text-align:center;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:7px 4px;font-size:11px;color:var(--sub);cursor:pointer}
  .step.on{background:var(--gold);color:#1a1509;border-color:var(--gold);font-weight:700}
  .step.done{border-color:#5a4a2c}
  .gm{background:#12161e;border:1px solid var(--line);border-radius:12px;padding:14px 16px;font-size:14.5px;line-height:1.75;white-space:pre-line}
  .gm .lb{color:var(--gold);font-size:11px;letter-spacing:.1em;display:block;margin-bottom:6px}
  .bc{background:#0e1620;border:1px solid #2c465a;color:var(--cold);border-radius:10px;padding:10px 14px;margin-top:10px;font-size:13.5px}

  .role-card{display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px;cursor:pointer;position:relative;overflow:hidden}
  .role-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rc)}
  .role-card:hover{border-color:var(--gold)}
  .role-card .av{font-size:24px;width:42px;height:42px;display:grid;place-items:center;background:var(--bg);border-radius:10px;flex:0 0 42px}
  .role-card .nm{font-weight:700}.role-card .jb{font-size:11.5px;color:var(--muted)}.role-card .tg{font-size:12px;color:#c3bcd2;margin-top:2px}

  .loc-group{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .loc-group .lh{padding:9px 13px;background:var(--panel2);font-weight:700;font-size:13.5px}
  .loc-group .lb{padding:8px 13px;display:flex;flex-direction:column;gap:7px}
  .slot{border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13px}
  .slot.locked{color:var(--muted);display:flex;justify-content:space-between;align-items:center;gap:8px}
  .slot.open{border-color:var(--cold);background:#0e1620}
  .slot.open .ct{font-weight:700;color:#a9d3ea;margin-bottom:3px}
  .slot.open.bait{border-color:#5a4a2c}
  .slot .rr{font-size:11px;color:var(--muted)}

  textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:11px;font-size:13.5px;font-family:inherit;line-height:1.6;resize:vertical}
  textarea:focus,select:focus{outline:none;border-color:var(--gold)}
  select{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:7px 10px;font-size:13px;font-family:inherit}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}

  .modal{position:fixed;inset:0;background:rgba(6,4,8,.82);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:60;padding:16px}.modal.on{display:flex}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:18px;max-width:560px;width:100%;padding:22px;box-shadow:var(--shadow);max-height:92vh;overflow-y:auto}
  .modal h2{margin:0 0 4px;font-size:20px}
  .sec{border-top:1px dashed var(--line);padding-top:11px;margin-top:11px}.sec:first-of-type{border-top:0;margin-top:0;padding-top:0}
  .sec .h{font-weight:700;color:var(--gold-b);font-size:13.5px;margin-bottom:4px}.sec .b{font-size:14px;color:#ded8ea;line-height:1.72}
  .hb{background:#2a1214;border:1px solid #5a2c2c;color:#ffb9b9;border-radius:10px;padding:10px 13px;font-weight:700;text-align:center;margin-bottom:12px}
  .frag{background:#0e1620;border:1px solid #2c465a;border-radius:10px;padding:9px 12px;margin:8px 0;color:#cfe0ee;font-size:13.5px}
  .frag .w{font-size:11px;color:var(--cold);margin-bottom:3px}
  .goal{display:flex;gap:8px;font-size:13px;padding:5px 0;border-bottom:1px solid var(--line)}.goal:last-child{border-bottom:0}.goal .pt{margin-left:auto;color:var(--good);font-weight:700;font-family:"Nanum Myeongjo",serif}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--gold);color:#1a1509;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;z-index:80;opacity:0;transition:.25s}
  .toast.on{opacity:1}
</style>
</head>
<body>
<header>
  <span class="b"><span class="mk">◈</span> 졸업사진 <span class="pill">게임보드</span></span>
  <span class="ph" id="hPhase"></span>
  <span style="margin-left:auto"><button class="btn sm" onclick="reset()">초기화</button></span>
</header>
<div class="tabs" id="tabs"></div>
<div class="wrap" id="root"></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ============ 시나리오 스냅샷 (scenario.py 기준 · 진상/채점은 에이전트가 보유) ============ */
const D = {
  title:"졸업사진", subtitle:"卒業寫眞 · 10년 만의 동창회",
  intro:"우리는 모두 동창이다. 하지만 왜인지, 기억이 흐릿하다. 오래된 친구이지만 — 낯선 이들.\n어느 날, 의문의 쪽지가 도착했다. 「10년 만의 동창회. 졸업식 날 밤, 3학년 2반에서. — 동창회장」\n고등학생 때의 기억은 안개 같다. 떠올리려 하면, 손가락 사이로 빠져나간다.\n동창회 장소는 인적 드문 폐교. 우리가 졸업한 학교다. 복도의 공기는 10년 전 겨울에서 멈춘 채 차갑다.\n3학년 2반의 문을 연다. 달빛이 비추는 교실 한가운데 — 교복을 입은 누군가가 쓰러져 있다.\n처음 보는 시체. 그런데. 이 시체가, 내 동창이라고?",
  phases:[
    {seq:1,name:"오프닝",ap:0,gm:"공통지문을 낭독하고, 각자 배역으로 자기소개(공개 정보만)한다."},
    {seq:2,name:"조사 R1",ap:3,gm:"먼저, 이 시체가 누구인지부터. (각자 3장 조사)"},
    {seq:3,name:"토론 1",ap:0,gm:"물품 3점의 주인은 이 안에 있다. 오늘 밤 무슨 일이 있었나?"},
    {seq:4,name:"조사 R2",ap:3,gm:"학교가 기억하는 것을 찾아라. (각자 3장 조사)"},
    {seq:5,name:"토론 2",ap:0,gm:"오승택은 10년 전에 죽었다. 그렇다면 — 그 겨울, 당신들은 무엇을 했나?"},
    {seq:6,name:"조사 R3",ap:2,gm:"마지막 문이 열렸다. (각자 2장 조사)"},
    {seq:7,name:"최종 토론",ap:0,gm:"죽인 사람이 꼭 손을 쓴 사람인가?"},
    {seq:8,name:"종막 · 질문지",ap:0,gm:"각자 마지막 질문에 답한다. 오승택을 죽인 것은 누구인가 — 당신은 누구를 지목하는가."},
    {seq:9,name:"진상 공개",ap:0,gm:"에이전트가 진상을 밝히고 엔딩을 확인한다."},
  ],
  interludes:{4:"…재학생 여러분께 알립니다. 분실물은, 잃어버린 자리에 있습니다.",6:"…하교 시간이 지났습니다. 아직 교실에 남아 있는 학생은 — 자신이 왜 남아 있는지 생각해 보십시오.",7:"…졸업식을 시작하겠습니다. 호명된 학생은, 자기 이름에 대답하십시오.",8:"마지막 질문입니다. — 오승택을 죽인 사람은, 누구입니까."},
  roles:[
    {id:"sim",name:"심상윤",age:"32",job:"가게 운영(기억은 흐릿)",avatar:"🚬",color:"#e6a355",hidden:false,
     tagline:"왕년의 분위기 메이커. 누구와도 금방 친해지는 호탕한 성격.",
     sheet:[
       {h:"자신에 대하여",b:"늘 사람이 따르는 쪽이었다. 시키지 않아도 다들 내 말대로 움직였고, 나는 그걸 우정이라 불렀다. 지금은 작은 가게를 한다고 말하지만, 가게의 간판 색이 기억나지 않는다."},
       {h:"기억의 균열",b:"졸업식이 기억나지 않는다. 사진 한 장 없다. J와 어떻게 헤어졌는지도. 그 겨울 이후의 모든 것이 젖은 종이처럼 찢겨 있다."},
       {h:"오승택과의 관계 (죄의 실체)",b:"승택이는 소꿉친구다. 매점 빵, 과제, 가방 — 걔가 '해주던' 거다. 나는 시킨 적 없다. …정말 없나? 걔가 싫다고 한 적이 없었을 뿐인 건 아닌가."},
       {h:"그날의 진실",b:"그 겨울 밤, 승택의 문자에 J의 사진이 붙어 있었다. '시키는 대로 해.' 나는 옥상으로 올라갔고 — 거부한다는 선택지가 없다는 게 어떤 것인지, 난간 앞에서 처음 알았다. 그리고 나는 떨어졌다."},
       {h:"당신의 심경",b:"두려운 건 라이터다. 기억이 없는 밤에 내가 뭘 했을까. 승택이 이야기가 나올 때마다 내가 나쁜 놈이었을지 모른다는 생각을, 나는 웃음으로 덮는다."},
       {h:"자백의 순간(트리거)",b:"B4(심부름 쪽지 'SY')+C3(마지막 문자)가 공론화되고 '시키는 대로 한다는 게 어떤 기분인지 아느냐'는 질문을 받으면 무너진다. C4(추모석)까지 나오면 자기지목 확정."},
     ],
     goals:[{t:"라이터·주종관계 초반 은폐",p:0},{t:"죄의 조각이 드러나게",p:10},{t:"최종에 자기 자신 지목(자백)",p:15}]},
    {id:"yu",name:"유지호",age:"32",job:"미대 출신(어렴풋)",avatar:"🏺",color:"#7fb4d6",hidden:false,
     tagline:"조용한 완벽주의자. 관찰력이 좋고 말수가 적다.",
     sheet:[
       {h:"자신에 대하여",b:"손으로 만드는 것만이 나를 증명했다. 재능은 부족했고, 그래서 더 절박했다. 지금 무슨 일을 하는지 물으면 '작업을 한다'고 답하지만, 최근 작업이 하나도 떠오르지 않는다."},
       {h:"기억의 균열",b:"대학에 갔던가? 합격 발표를 본 기억이… 봤다고 믿을 뿐, 장면이 없다. 그 겨울, 도자기를 감싸 안았던 감촉에서 기억이 끊긴다."},
       {h:"오승택과의 관계 (죄의 실체)",b:"말 한번 섞은 적 없다. 저 재능이 내 유일한 자리를 가져간다 싶었다. 아무도 없는 미술실, 시너, 5분. 나는 그림을 지웠을 뿐이라 되뇌었다 — 그게 그의 유일한 동아줄인 걸 알면서."},
       {h:"그날의 진실",b:"그 겨울, 승택이 내 첫 입상작을 들고 나타났다. '네가 내 전부를 부쉈으니까.' 도자기가 도로 위에서 부서졌고, 파편을 줍던 손등 위로 헤드라이트가 쏟아졌다."},
       {h:"당신의 심경",b:"두려운 건 단추다. 미술실에 흘린 교표 단추가 나오면 끝이다. '그의 인생을 죽인 것'에 대해서라면… 그 문장은 생각하지 않기로 한다."},
       {h:"자백의 순간(트리거)",b:"D2(단추)+D3(실격 공문)이 공론화되고 단추 주인을 물으면 부분 인정('그 날 미술실에 있었다'). D4(파편 상자)까지 나오면 전면 자백·자기지목."},
     ],
     goals:[{t:"조각칼·훼손 초반 은폐",p:0},{t:"죄의 조각이 드러나게",p:10},{t:"최종에 자기 자신 지목(자백)",p:15}]},
    {id:"lee",name:"이정민",age:"32",job:"봉사활동 이야기를 먼저 꺼냄",avatar:"🕊️",color:"#8ec98a",hidden:false,
     tagline:"반의 궂은일을 도맡던 '좋은 사람'. 다정하고 공감 능력이 좋아 보인다.",
     sheet:[
       {h:"자신에 대하여",b:"나는 좋은 사람이다. 그렇게 말해오면 정말 그렇게 되는 줄 알았다. 사람들이 고마워할 때의 그 표정을 나는 사랑했다 — 그 사람 자체보다도."},
       {h:"기억의 균열",b:"졸업 후 누구와도 연락한 기억이 없다. '내 사람들'이 그렇게 많았는데 얼굴이 하나도 떠오르지 않는다. 그 겨울, 복도에 흩날리던 종이들에서 기억이 끊긴다."},
       {h:"오승택과의 관계 (죄의 실체)",b:"승택의 유일한 친구는 나였다. 그런데 어느 날 걔가 물었다. '너 지금, 나 불쌍해서 좋지?' 그날 이후 걔를 피했고, 주변엔 '내가 걔한테 제일 잘해줬는데'라고, 뒤에서는 더한 말도 했다. 선의라는 이름의 가장 높은 자리에서, 나는 그를 내려다봤다."},
       {h:"그날의 진실",b:"그 겨울, 내 목소리가 담긴 유인물이 전교에 뿌려졌다. 전부 사실이라 반박할 수 없었다. 승택이 10년간 견딘 눈빛 속에서, 나는 무너졌고 스스로를 끝냈다."},
       {h:"당신의 심경",b:"두려운 건 녹취다. '좋은 사람'이 무너지는 것은 죽음보다 무섭다 — 실제로 그랬다. 그래서 이 밤에도 중재자 자리를 먼저 차지한다. 그동안은 아무도 나를 심문하지 않으니까."},
       {h:"자백의 순간(트리거)",b:"E3(녹취 유인물)이 공론화되면 '짜깁기'로 1차 방어. B5(장례의 조사)가 공개되고 '조사를 읽으며 무슨 생각을 했느냐'는 질문을 받으면 무너진다."},
     ],
     goals:[{t:"뒷말·선인 프레임 초반 은폐",p:0},{t:"죄의 조각이 드러나게",p:10},{t:"최종에 자기 자신 지목(자백)",p:15}]},
    {id:"ose",name:"오세원",age:"32",job:"조용해서 기억 안 날 수도 있는 동창",avatar:"📷",color:"#c8442f",hidden:true,

const LS="board.gp.v1";

function save(){ try{localStorage.setItem(LS,JSON.stringify(S));}catch(e){} }
const $=id=>document.getElementById(id);
const esc=s=>String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const card=id=>D.cards.find(c=>c.id===id);
const roundOf=seq=> seq>=6?3:seq>=4?2:seq>=2?1:0;

function autoReveal(){ const cr=roundOf(S.seq); D.cards.forEach(c=>{ if(c.ob&&c.r<=cr&&!S.revealed.includes(c.id))S.revealed.push(c.id); }); }

const TABS=[["run","진행"],["cast","배역"],["board","조사"],["log","진행 로그"],["final","종막"]];
function render(){
  autoReveal();
  $("hPhase").textContent="· "+D.phases[S.seq-1].name+" (조사 R"+roundOf(S.seq)+")";
  const tb=$("tabs"); tb.innerHTML="";
  TABS.forEach(([k,l])=>{ const t=document.createElement("div"); t.className="tab"+(S.tab===k?" on":""); t.textContent=l; t.onclick=()=>{S.tab=k;save();render();}; tb.appendChild(t); });
  const r=$("root"); r.innerHTML="";
  ({run:renderRun,cast:renderCast,board:renderBoard,log:renderLog,final:renderFinal}[S.tab])(r);
  save();
}

  const ph=D.phases[S.seq-1]; const il=D.interludes[S.seq];
  r.innerHTML=`<div class="card">${step}

function renderBoard(r){

function renderLog(r){
  r.innerHTML=`<div class="card"><h2>진행 로그</h2><div class="lead" style="margin-bottom:8px">오간 대사·판단을 적어두세요. '🔗 에이전트에게 상태 복사'가 최근 로그를 함께 담아줍니다.</div>
    <textarea id="logta" rows="16" placeholder="예)\n[GM] (공통지문 낭독)\n심상윤(나): 다들 오랜만이네. 근데 저 시체는 대체…\n이정민(AI): 우선 진정하자. 우리끼리 싸울 일은 아니잖아?">${esc(S.log)}</textarea>
    <div class="row" style="margin-top:10px"><button class="btn sm" onclick="pushState()">📋 상태 복사(수동)</button><button class="btn sm" onclick="saveLog()">저장</button></div></div>`;
  $("logta").addEventListener("input",e=>{S.log=e.target.value;save();});
}
function renderFinal(r){
  r.innerHTML=`<div class="card"><h2>종막 · 질문지</h2><div class="lead" style="margin-bottom:10px">각자 아래 4문항에 서술로 답합니다. <b>채점·엔딩은 Claude 세션(에이전트)</b>이 진상 기준으로 처리합니다. '🔗 상태 복사'로 답변을 세션에 넘기세요.</div>
    ${D.finalQuestions.map((q,i)=>`<div class="sec"><div class="h">${i+1}. ${esc(q)}</div></div>`).join("")}
    <div class="lead" style="margin-top:12px">판정 규칙: 가해자 3인이 모두 '자기 자신'을 (죄 2개 이상 근거와 함께) 지목 → <b>진혼</b>, 일부 → 반쪽 진혼, 아무도 못 하면 → 오인·루프.</div></div>`;
}

function openSheet(id){
  const c=D.roles.find(x=>x.id===id); const cr=roundOf(S.seq);
  const frags=Object.entries(D.memory[id]||{}).filter(([k,v])=>v&&((k==="t1"&&S.seq>=3)||(k==="t2"&&S.seq>=5)||(k==="t3"&&S.seq>=7)))
    .map(([k,v])=>`<div class="frag"><div class="w">기억의 파편 · ${k==="t1"?"토론1":k==="t2"?"토론2":"최종토론"}</div>${esc(v)}</div>`).join("");
  $("mbox").innerHTML=`<h2 style="color:${c.color}">${c.avatar} ${esc(c.name)} <span style="font-size:13px;color:var(--muted)">· ${esc(c.job)}</span></h2>
    <div class="lead" style="margin-bottom:8px">${esc(c.tagline)}</div>
    ${c.hidden?`<div class="hb">⚑ 스포일러 배역 — 정체를 숨기세요</div>`:""}
    ${c.sheet.map(x=>`<div class="sec"><div class="h">${esc(x.h)}</div><div class="b">${esc(x.b)}</div></div>`).join("")}
    ${frags?`<div class="sec"><div class="h">떠오른 기억</div>${frags}</div>`:""}
    <div class="sec"><div class="h">나의 목표</div>${c.goals.map(g=>`<div class="goal"><span>${esc(g.t)}</span><span class="pt">+${g.p}</span></div>`).join("")}</div>
    <div class="row" style="margin-top:14px;justify-content:flex-end"><button class="btn" onclick="closeM()">확인</button></div>`;
  $("modal").classList.add("on");
}
function closeM(){ $("modal").classList.remove("on"); }

function setSeq(n){ n=Math.max(1,Math.min(9,n)); const changed=n!==S.seq; S.seq=n; autoReveal(); save(); render(); if(changed) pushState(true); }
function reveal(id){ const c=card(id); const cr=roundOf(S.seq);
  if(c.r>cr){toast("아직 조사할 수 없습니다");return;} if(c.req&&!S.revealed.includes(c.req)){toast("선행 단서가 필요합니다");return;}
  if(!S.revealed.includes(id)){ S.revealed.push(id); save(); render(); pushState(true); } }
function saveLog(){ toast("저장됨"); }
/* 조사카드 공개 / 페이즈 진행 시 자동 호출 — 최신 공개 상태를 클립보드로 밀어준다(에이전트가 인지) */
function pushState(auto){
  const ph=D.phases[S.seq-1];
  const rev=S.revealed.map(id=>{const c=card(id);return `- [${c.ln}] ${c.t}: ${c.b}`;}).join("\n");
  const log=(S.log||"").slice(-1400);
  const il=D.interludes[S.seq];
  const block=`[졸업사진 · 게임보드 상태 업데이트]
단계: ${ph.name} (조사 R${roundOf(S.seq)})
GM 지문: ${ph.gm}${il?`\n망령 인터루드(교내방송): ${il}`:""}

■ 지금까지 공개된 조사카드 (전체):
${rev||"(아직 없음)"}

■ 최근 진행 로그:
${log||"(없음)"}

※ 위 공개 카드·단계를 인지하고 이후 GM·배역 진행에 반영해줘. 사람이 맡지 않은 배역과 GM은 네가 진행한다.`;
  copy(block); toast(auto?"📋 상태 자동 복사됨 — 세션에 붙여넣기":"📋 복사됨 — 세션에 붙여넣기");
}
function copy(t){ if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).catch(()=>fallbackCopy(t));}else fallbackCopy(t); }
function fallbackCopy(t){ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select(); try{document.execCommand("copy");}catch(e){} ta.remove(); }
let tt; function toast(m){ const el=$("toast"); el.textContent=m; el.classList.add("on"); clearTimeout(tt); tt=setTimeout(()=>el.classList.remove("on"),1800); }
function reset(){ if(confirm("보드를 초기화할까요? (단계·공개카드·로그가 지워집니다)")){ S={seq:1,revealed:[],log:"",tab:"run"}; save(); render(); } }

render();
</script>
<div class="modal" id="modal"><div class="box" id="mbox"></div></div>
</body>
</html>
